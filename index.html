<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Portfolio Dual - Développeur & Designer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');
        
        :root {
            --dev-primary: #2563eb;
            --dev-secondary: #1e40af;
            --dev-light: rgba(219, 234, 254, 0.5);
            --dev-bg-light: rgba(219, 234, 254, 0.4);
            --design-primary: #ec4899;
            --design-secondary: #db2777;
            --design-light: rgba(252, 231, 243, 0.5);
            --design-bg-light: rgba(252, 231, 243, 0.4);
            --neutral-bg: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--neutral-bg);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }
        
        .split-screen {
            display: flex;
            width: 100%;
            min-height: 100vh;
            position: relative;
        }
        
        .dev-side, .design-side {
            flex: 1;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dev-side { background: var(--dev-bg-light); }
        .design-side { background: var(--design-bg-light); }
        
        .side-text {
            position: absolute;
            top: 35%;
            transform: translateY(-50%);
            text-align: center;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.5s ease;
            width: 100%;
        }
        
        .dev-text { left: 0; color: var(--dev-primary); }
        .design-text { right: 0; color: var(--design-primary); }
        
        .main-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        
        .sub-text {
            font-size: clamp(0.9rem, 2.5vw, 1.5rem);
            font-weight: 500;
            opacity: 0.8;
        }
        
        .floating-element {
            position: absolute;
            opacity: 0.3;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 1;
            will-change: transform, opacity;
            animation: gentleFloat 15s infinite alternate ease-in-out;
        }
        
        @keyframes gentleFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5px, -5px) rotate(2deg); }
        }
        
        /* Styles des objets Développeur */
        .code-snippet {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--dev-primary);
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid var(--dev-primary);
            max-width: 120px;
        }
        .computer-icon {
            width: 45px; height: 35px;
            background: linear-gradient(135deg, var(--dev-primary), var(--dev-secondary));
            border-radius: 5px;
            position: relative;
        }
        .computer-icon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 6px;
            background: var(--dev-secondary);
            border-radius: 0 0 3px 3px;
        }
        .robot-icon {
            width: 40px; height: 52px;
            background: var(--dev-primary);
            border-radius: 6px;
            position: relative;
        }
        .robot-icon::before, .robot-icon::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }
        .robot-icon::before { left: 6px; }
        .robot-icon::after { right: 6px; }
        .terminal-icon {
            width: 90px; height: 55px;
            background: #0f172a;
            border-radius: 5px;
            padding: 6px;
            color: #10b981;
            font-family: monospace;
            font-size: 8px;
        }
        .server-icon {
            width: 55px; height: 42px;
            background: linear-gradient(135deg, #1e293b, #334155);
            border-radius: 4px;
            position: relative;
        }
        .server-icon::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 8px;
            right: 8px;
            height: 4px;
            background: var(--dev-primary);
        }
        .git-icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: var(--dev-primary);
        }
        .database-icon {
            width: 55px; height: 35px;
            background: linear-gradient(135deg, var(--dev-primary), var(--dev-secondary));
            border-radius: 4px 4px 0 0;
            position: relative;
        }
        .database-icon::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 5px;
            right: 5px;
            height: 8px;
            background: var(--dev-secondary);
            border-radius: 0 0 3px 3px;
        }
        .mobile-icon {
            width: 28px; height: 48px;
            background: #1e293b;
            border-radius: 4px;
            position: relative;
        }
        .api-icon {
            width: 50px; height: 26px;
            background: white;
            border-radius: 3px;
            border: 2px solid var(--dev-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: var(--dev-primary);
        }
        .cloud-icon {
            width: 52px; height: 26px;
            background: white;
            border-radius: 25px;
            position: relative;
        }
        .cloud-icon::before {
            content: '';
            position: absolute;
            width: 22px; height: 22px;
            background: white;
            border-radius: 50%;
            top: -10px;
            left: 6px;
        }
        .cloud-icon::after {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            background: white;
            border-radius: 50%;
            top: -12px;
            right: 6px;
        }
        .chart-icon {
            width: 52px; height: 32px;
            background: white;
            border-radius: 3px;
            padding: 3px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        .chart-bar {
            flex: 1;
            background: var(--dev-primary);
            border-radius: 1px 1px 0 0;
        }
        .ai-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--dev-primary), #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        .python-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #3776ab, #ffd43b);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
        }
        .js-icon {
            width: 40px; height: 40px;
            background: #f7df1e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #000;
        }
        .react-icon {
            width: 40px; height: 40px;
            background: #61dafb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .node-icon {
            width: 40px; height: 40px;
            background: #339933;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
        }
        .docker-icon {
            width: 44px; height: 36px;
            background: #2496ed;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
        }
        .github-icon {
            width: 40px; height: 40px;
            background: #181717;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
        }
        .vscode-icon {
            width: 40px; height: 40px;
            background: #007acc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
        }
        .cog-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #64748b, #475569);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            animation: spin 8s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Styles des objets Designer */
        .color-palette {
            width: 70px; height: 20px;
            display: flex;
            border-radius: 4px;
            overflow: hidden;
        }
        .color-swatch { flex: 1; }
        .paintbrush {
            width: 50px; height: 13px;
            background: linear-gradient(135deg, var(--design-primary), var(--design-secondary));
            border-radius: 6px;
            position: relative;
            transform: rotate(-20deg);
        }
        .paintbrush::after {
            content: '';
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 5px;
            background: var(--design-secondary);
        }
        .typography-sample {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: bold;
            color: var(--design-primary);
        }
        .cube-3d {
            width: 40px; height: 40px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 12s linear infinite;
        }
        @keyframes rotateCube {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .cube-face {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--design-primary), var(--design-secondary));
            border: 1px solid rgba(255,255,255,0.4);
            opacity: 0.8;
        }
        .cube-front { transform: translateZ(20px); }
        .cube-back { transform: rotateY(180deg) translateZ(20px); }
        .cube-right { transform: rotateY(90deg) translateZ(20px); }
        .cube-left { transform: rotateY(-90deg) translateZ(20px); }
        .cube-top { transform: rotateX(90deg) translateZ(20px); }
        .cube-bottom { transform: rotateX(-90deg) translateZ(20px); }
        .pen-tool {
            width: 48px; height: 48px;
            position: relative;
        }
        .pen-tool::before {
            content: '';
            position: absolute;
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--design-primary), #a855f7);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .artboard {
            width: 70px; height: 55px;
            background: white;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }
        .artboard::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            background: linear-gradient(135deg, var(--design-primary), #f472b6);
            opacity: 0.6;
        }
        .gradient-circle {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--design-primary), #a855f7, #6366f1);
        }
        .wireframe {
            width: 60px; height: 72px;
            position: relative;
        }
        .wireframe::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--design-primary);
            border-radius: 3px;
        }
        .wireframe::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px dashed var(--design-secondary);
        }
        .ruler-icon {
            width: 64px; height: 13px;
            background: white;
            border-radius: 2px;
            position: relative;
        }
        .ruler-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 6px; right: 6px;
            height: 2px;
            background: var(--design-primary);
            transform: translateY(-50%);
        }
        .magnifier-icon {
            width: 44px; height: 44px;
            position: relative;
        }
        .magnifier-icon::before {
            content: '';
            position: absolute;
            width: 32px; height: 32px;
            border: 3px solid var(--design-primary);
            border-radius: 50%;
            top: 0; left: 0;
        }
        .magnifier-icon::after {
            content: '';
            position: absolute;
            width: 16px; height: 3px;
            background: var(--design-primary);
            bottom: 6px; right: 0;
            transform: rotate(45deg);
        }
        .star-icon {
            width: 44px; height: 44px;
            position: relative;
        }
        .star-icon::before {
            content: '★';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--design-primary);
            font-size: 32px;
        }
        .color-wheel {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ec4899, #f472b6, #a855f7, #6366f1, #14b8a6, #10b981, #84cc16, #f59e0b, #ef4444);
        }
        .palette-icon {
            width: 44px; height: 44px;
            background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7);
            border-radius: 50%;
        }
        .brush-icon {
            width: 36px; height: 36px;
            background: var(--design-primary);
            border-radius: 0 16px 16px 16px;
            transform: rotate(45deg);
        }
        .layer-icon {
            width: 40px; height: 40px;
            background: rgba(236, 72, 153, 0.3);
            border: 2px solid var(--design-primary);
            border-radius: 6px;
            position: relative;
        }
        .layer-icon::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid var(--design-secondary);
            border-radius: 6px;
        }
        .font-icon {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--design-primary), var(--design-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid-icon {
            width: 44px; height: 44px;
            background: repeating-linear-gradient(45deg, var(--design-primary) 0px, var(--design-primary) 2px, transparent 2px, transparent 10px);
            border-radius: 6px;
        }
        
        /* Yin-Yang */
        .yinyang-container {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: min(280px, 40vw);
            height: min(280px, 40vw);
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .yinyang-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .yinyang {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: visible;
            box-shadow: 0 25px 75px rgba(0, 0, 0, 0.2);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            transform-style: preserve-3d;
            animation: yinyangFloat3D 4s infinite alternate ease-in-out;
        }
        
        @keyframes yinyangFloat3D {
            0% { transform: rotateY(0deg) rotateX(5deg) scale(1); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); }
            50% { transform: rotateY(0deg) rotateX(0deg) scale(1.05); filter: drop-shadow(0 40px 50px rgba(236,72,153,0.3)); }
            100% { transform: rotateY(0deg) rotateX(5deg) scale(1); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); }
        }
        
        .yinyang::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--dev-primary), var(--design-primary));
            opacity: 0;
            z-index: -1;
            animation: glowPulse 4s infinite alternate;
            filter: blur(20px);
        }
        
        @keyframes glowPulse {
            0% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 0.5; transform: scale(1.15); }
            100% { opacity: 0.2; transform: scale(0.95); }
        }
        
        .clickable-zone {
            position: absolute;
            width: 50%;
            height: 100%;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            z-index: 101;
            pointer-events: auto;
        }
        
        .dev-zone { left: 0; border-radius: 125px 0 0 125px; }
        .design-zone { right: 0; border-radius: 0 125px 125px 0; }
        
        .circle-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: all 0.5s ease;
            z-index: 102;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .clickable-zone:hover .circle-content {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .circle-icon { font-size: 1.8rem; margin-bottom: 0.3rem; display: block; }
        .circle-subtitle { font-size: 0.75rem; color: white; font-weight: 600; }
        
        .inner-circle {
            position: absolute;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            top: 25%;
            pointer-events: none;
        }
        
        .dev-circle {
            left: 0;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.3), 0 12px 35px rgba(37, 99, 235, 0.4);
        }
        
        .design-circle {
            right: 0;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.3), 0 12px 35px rgba(236, 72, 153, 0.4);
        }
        
        .center-dot {
            position: absolute;
            width: 25%;
            height: 25%;
            border-radius: 50%;
            top: 37.5%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dev-dot { left: 12.5%; background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); }
        .design-dot { right: 12.5%; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .dot-icon { font-size: 0.9rem; color: white; opacity: 0; transition: opacity 0.4s ease; }
        .yinyang:hover .dot-icon { opacity: 0.8; }
        
        .theme-selector {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }
        
        .theme-selector label { font-size: 0.75rem; font-weight: 500; }
        .theme-options { display: flex; gap: 5px; }
        .theme-btn {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .theme-btn:hover { transform: scale(1.15); border-color: white; }
        .theme-btn.active { border-color: white; transform: scale(1.1); }
        .theme-btn.default { background: linear-gradient(135deg, #2563eb, #ec4899); }
        .theme-btn.blue { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .theme-btn.pink { background: linear-gradient(135deg, #831843, #ec4899); }
        .theme-btn.green { background: linear-gradient(135deg, #065f46, #10b981); }
        .theme-btn.purple { background: linear-gradient(135deg, #5b21b6, #a855f7); }
        .theme-btn.orange { background: linear-gradient(135deg, #9a3412, #f97316); }
        
        .instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .instruction::before {
            content: '👇';
            font-size: 1rem;
            animation: handPointDown 1s infinite alternate;
        }
        
        @keyframes handPointDown {
            0% { transform: translateY(0); }
            100% { transform: translateY(6px); }
        }
        
        .instruction-badge {
            background: linear-gradient(135deg, var(--dev-primary), var(--dev-secondary));
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .instruction-badge.design {
            background: linear-gradient(135deg, var(--design-primary), var(--design-secondary));
        }
        
        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .floating-element { transform: scale(0.85); }
            .side-text { top: 32%; }
        }
        
        @media (max-width: 768px) {
            .split-screen { flex-direction: column; }
            .dev-side, .design-side { height: 50vh; flex: none; min-height: 45vh; }
            .side-text { top: 30%; }

    <script>
        (function() {
            const devZone = document.getElementById('devZone');
            const designZone = document.getElementById('designZone');
            const devSide = document.getElementById('devSide');
            const designSide = document.getElementById('designSide');
            const devText = document.querySelector('.dev-text');
            const designText = document.querySelector('.design-text');
            const devElements = devSide.querySelectorAll('.floating-element');
            const designElements = designSide.querySelectorAll('.floating-element');
            
            // Gestion du thème
            const themeBtns = document.querySelectorAll('.theme-btn');
            const root = document.documentElement;
            
            const themes = {
                default: { dev: '#2563eb', devSecondary: '#1e40af', devBg: 'rgba(219, 234, 254, 0.4)', design: '#ec4899', designSecondary: '#db2777', designBg: 'rgba(252, 231, 243, 0.4)' },
                blue: { dev: '#1e3a8a', devSecondary: '#1e3a8a', devBg: 'rgba(30, 58, 138, 0.2)', design: '#3b82f6', designSecondary: '#2563eb', designBg: 'rgba(59, 130, 246, 0.2)' },
                pink: { dev: '#831843', devSecondary: '#831843', devBg: 'rgba(131, 24, 67, 0.2)', design: '#ec4899', designSecondary: '#db2777', designBg: 'rgba(236, 72, 153, 0.2)' },
                green: { dev: '#065f46', devSecondary: '#065f46', devBg: 'rgba(6, 95, 70, 0.2)', design: '#10b981', designSecondary: '#059669', designBg: 'rgba(16, 185, 129, 0.2)' },
                purple: { dev: '#5b21b6', devSecondary: '#5b21b6', devBg: 'rgba(91, 33, 182, 0.2)', design: '#a855f7', designSecondary: '#9333ea', designBg: 'rgba(168, 85, 247, 0.2)' },
                orange: { dev: '#9a3412', devSecondary: '#9a3412', devBg: 'rgba(154, 52, 18, 0.2)', design: '#f97316', designSecondary: '#ea580c', designBg: 'rgba(249, 115, 22, 0.2)' }
            };
            
            function applyTheme(themeName) {
                const theme = themes[themeName];
                if (!theme) return;
                root.style.setProperty('--dev-primary', theme.dev);
                root.style.setProperty('--dev-secondary', theme.devSecondary);
                root.style.setProperty('--dev-bg-light', theme.devBg);
                root.style.setProperty('--design-primary', theme.design);
                root.style.setProperty('--design-secondary', theme.designSecondary);
                root.style.setProperty('--design-bg-light', theme.designBg);
                devSide.style.backgroundColor = theme.devBg;
                designSide.style.backgroundColor = theme.designBg;
                document.querySelectorAll('.instruction-badge').forEach(badge => {
                    if (badge.classList.contains('design')) {
                        badge.style.background = `linear-gradient(135deg, ${theme.design}, ${theme.designSecondary})`;
                    } else {
                        badge.style.background = `linear-gradient(135deg, ${theme.dev}, ${theme.devSecondary})`;
                    }
                });
                localStorage.setItem('selectedTheme', themeName);
                themeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === themeName));
            }
            
            themeBtns.forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));
            applyTheme(localStorage.getItem('selectedTheme') || 'default');
            
            // Interactions au survol
            devZone.addEventListener('mouseenter', () => {
                devSide.style.backgroundColor = getComputedStyle(root).getPropertyValue('--dev-primary') + '20';
                designSide.style.backgroundColor = 'rgba(0,0,0,0.05)';
                devText.style.opacity = '1';
                designText.style.opacity = '0.3';
                devElements.forEach(el => el.style.opacity = '0.9');
                designElements.forEach(el => el.style.opacity = '0.2');
            });
            
            designZone.addEventListener('mouseenter', () => {
                designSide.style.backgroundColor = getComputedStyle(root).getPropertyValue('--design-primary') + '20';
                devSide.style.backgroundColor = 'rgba(0,0,0,0.05)';
                designText.style.opacity = '1';
                devText.style.opacity = '0.3';
                designElements.forEach(el => el.style.opacity = '0.9');
                devElements.forEach(el => el.style.opacity = '0.2');
            });
            
            function resetSides() {
                devSide.style.backgroundColor = getComputedStyle(root).getPropertyValue('--dev-bg-light');
                designSide.style.backgroundColor = getComputedStyle(root).getPropertyValue('--design-bg-light');
                devText.style.opacity = '1';
                designText.style.opacity = '1';
                devElements.forEach(el => el.style.opacity = '0.3');
                designElements.forEach(el => el.style.opacity = '0.3');
            }
            
            devZone.addEventListener('mouseleave', () => setTimeout(() => { if (!designZone.matches(':hover')) resetSides(); }, 100));
            designZone.addEventListener('mouseleave', () => setTimeout(() => { if (!devZone.matches(':hover')) resetSides(); }, 100));
            
            // Animation au clic
            [devZone, designZone].forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const href = this.getAttribute('href');
                    document.body.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    document.body.style.opacity = '0';
                    document.body.style.transform = this.classList.contains('dev-zone') ? 'translateX(-30px)' : 'translateX(30px)';
                    setTimeout(() => window.location.href = href, 500);
                });
            });
            
            // Gestion du retour (cache)
            window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });
            if (window.performance && window.performance.getEntriesByType) {
                const navEntries = performance.getEntriesByType('navigation');
                if (navEntries.length > 0 && navEntries[0].type === 'back_forward') window.location.reload();
            }
        })();
    </script>
